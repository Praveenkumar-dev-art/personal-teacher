<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="sunGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"><stop offset="0%" style="stop-color:rgb(255,255,0);stop-opacity:1" /><stop offset="100%" style="stop-color:rgb(255,165,0);stop-opacity:1" /></radialGradient></defs><rect x="0" y="0" width="800" height="600" fill="#0A0A2A" /><text x="400" y="40" font-family="Arial, sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Our Solar System</text><circle cx="400" cy="300" r="80" fill="url(#sunGradient)" stroke="#FFD700" stroke-width="2" /><text x="400" y="300" font-family="Arial, sans-serif" font-size="24" fill="#000000" text-anchor="middle" dominant-baseline="middle">Sun</text><ellipse cx="400" cy="300" rx="150" ry="100" fill="none" stroke="#444466" stroke-width="1" /><circle cx="550" cy="300" r="8" fill="#B0C4DE" /><text x="550" y="280" font-family="Arial, sans-serif" font-size="14" fill="#B0C4DE" text-anchor="middle" dominant-baseline="middle">Earth</text><ellipse cx="400" cy="300" rx="250" ry="180" fill="none" stroke="#444466" stroke-width="1" /><circle cx="650" cy="300" r="16" fill="#E1A470" /><text x="650" y="275" font-family="Arial, sans-serif" font-size="14" fill="#E1A470" text-anchor="middle" dominant-baseline="middle">Mars</text><ellipse cx="400" cy="300" rx="350" ry="260" fill="none" stroke="#444466" stroke-width="1" /><circle cx="750" cy="300" r="30" fill="#D3B381" /><text x="750" y="250" font-family="Arial, sans-serif" font-size="14" fill="#D3B381" text-anchor="middle" dominant-baseline="middle">Jupiter</text></svg>
